name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "20 18 * * *"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate SVG files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23D9BED1&color_dots=%23f6f8fa,%23F4EAF2,%23D9BED1,%238B5E83,%233447A4
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23D9BED1

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
