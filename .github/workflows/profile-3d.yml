name: Generate 3D contribution profile

on:
  workflow_dispatch:
  schedule:
    - cron: "10 18 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Generate 3D contribution image
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated image
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib
          if git commit -m "Generate 3D contribution profile"; then
            git push
          else
            echo "No generated changes"
          fi
