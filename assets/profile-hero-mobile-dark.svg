<svg width="600" height="430" viewBox="0 0 600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Seung-Won Yu — Ideas, made tangible.</title>
  <desc id="desc">A compact introduction banner for Seung-Won Yu on mobile screens.</desc>
  <defs>
    <linearGradient id="surface" x1="20" y1="18" x2="580" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161B22"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(530 42) rotate(135) scale(290)">
      <stop stop-color="#2997FF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#2997FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="430" rx="32" fill="url(#surface)"/>
  <rect width="600" height="430" rx="32" fill="url(#glow)"/>
  <rect x=".5" y=".5" width="599" height="429" rx="31.5" stroke="#30363D"/>
  <circle cx="48" cy="54" r="5" fill="#2997FF"/>
  <text x="66" y="60" fill="#8C959F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" letter-spacing="2">SEUNG-WON YU</text>
  <text x="44" y="160" fill="#F0F6FC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="700" letter-spacing="-2.8">Ideas, made</text>
  <text x="44" y="218" fill="#F0F6FC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="700" letter-spacing="-2.8">tangible.</text>
  <text x="47" y="278" fill="#2997FF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="600" letter-spacing="-.8">생각을 작동하는 경험으로 만듭니다.</text>
  <line x1="47" y1="330" x2="553" y2="330" stroke="#30363D"/>
  <text x="47" y="376" fill="#8C959F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" letter-spacing=".4">AI WORKFLOWS · WEB PRODUCTS · GAMES</text>
</svg>
