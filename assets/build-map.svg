<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Seung-Won Yu build map</title>
  <desc id="desc">A visual map showing ideas becoming games, AI portals, useful tools, and portfolio-ready projects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFEFB"/>
      <stop offset="0.52" stop-color="#F8F4EE"/>
      <stop offset="1" stop-color="#F7EEF5"/>
    </linearGradient>
    <linearGradient id="line" x1="160" y1="180" x2="1040" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D9BED1"/>
      <stop offset="0.5" stop-color="#3447A4"/>
      <stop offset="1" stop-color="#F4C2A1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1C1F2A" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1C1F2A; }
      .mono { font-family: Menlo, Consolas, monospace; fill: #6E7180; }
      .small { font-size: 18px; }
      .title { font-size: 28px; font-weight: 800; }
      .step { font-size: 21px; font-weight: 760; }
      .muted { fill: #7B7E8A; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation-delay: .45s; }
      .pulse3 { animation-delay: .9s; }
      .pulse4 { animation-delay: 1.35s; }
      @keyframes pulse {
        0%, 100% { opacity: .78; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#E4DCD0" stroke-width="2"/>

  <text x="52" y="64" class="label title">Build Map</text>
  <text x="52" y="96" class="mono small">idea - prototype - product - portfolio</text>

  <path d="M165 184 C 285 95, 395 95, 515 184 S 745 273, 865 184 S 970 96, 1040 146" stroke="url(#line)" stroke-width="7" stroke-linecap="round"/>
  <path d="M165 184 C 285 95, 395 95, 515 184 S 745 273, 865 184 S 970 96, 1040 146" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".5"/>

  <g filter="url(#softShadow)" class="pulse">
    <rect x="76" y="132" width="178" height="122" rx="22" fill="#FFFFFF"/>
    <circle cx="118" cy="174" r="20" fill="#F4EAF2"/>
    <text x="108" y="181" class="label step">01</text>
    <text x="118" y="222" text-anchor="middle" class="label step">Idea Inbox</text>
    <text x="118" y="247" text-anchor="middle" class="mono small">rough sparks</text>
  </g>

  <g filter="url(#softShadow)" class="pulse pulse2">
    <rect x="366" y="70" width="210" height="126" rx="22" fill="#FFFFFF"/>
    <circle cx="410" cy="112" r="20" fill="#EAF2FF"/>
    <text x="400" y="119" class="label step">02</text>
    <text x="471" y="132" text-anchor="middle" class="label step">Playable Game</text>
    <text x="471" y="158" text-anchor="middle" class="mono small">React + Firebase</text>
  </g>

  <g filter="url(#softShadow)" class="pulse pulse3">
    <rect x="651" y="166" width="220" height="126" rx="22" fill="#FFFFFF"/>
    <circle cx="696" cy="208" r="20" fill="#FFF1D8"/>
    <text x="686" y="215" class="label step">03</text>
    <text x="761" y="228" text-anchor="middle" class="label step">AI Workroom</text>
    <text x="761" y="254" text-anchor="middle" class="mono small">files + agents</text>
  </g>

  <g filter="url(#softShadow)" class="pulse pulse4">
    <rect x="947" y="100" width="182" height="126" rx="22" fill="#FFFFFF"/>
    <circle cx="990" cy="142" r="20" fill="#EAF8EF"/>
    <text x="980" y="149" class="label step">04</text>
    <text x="1038" y="162" text-anchor="middle" class="label step">Ship</text>
    <text x="1038" y="188" text-anchor="middle" class="mono small">README ready</text>
  </g>

  <rect x="52" y="290" width="1096" height="1" fill="#E4DCD0"/>
  <text x="52" y="326" class="mono small">Currently polishing: PangPang Anipang · Apple Burst · Workroom Portal · better project previews</text>
</svg>
