<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Seung-Won Yu — Ideas, made tangible.</title>
  <desc id="desc">A minimal introduction banner for Seung-Won Yu, an AI workflow and web product builder.</desc>
  <defs>
    <linearGradient id="surface" x1="40" y1="18" x2="1160" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFBFD"/>
      <stop offset="1" stop-color="#F1F4F8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1062 56) rotate(135) scale(412 412)">
      <stop stop-color="#0071E3" stop-opacity=".16"/>
      <stop offset="1" stop-color="#0071E3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="430" rx="36" fill="url(#surface)"/>
  <rect width="1200" height="430" rx="36" fill="url(#glow)"/>
  <circle cx="88" cy="78" r="6" fill="#0071E3"/>
  <text x="110" y="86" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" letter-spacing="2.4">SEUNG-WON YU</text>
  <text x="80" y="206" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="70" font-weight="700" letter-spacing="-3.2">Ideas, made tangible.</text>
  <text x="84" y="266" fill="#0071E3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="600" letter-spacing="-1">생각을 작동하는 경험으로 만듭니다.</text>
  <line x1="84" y1="326" x2="1116" y2="326" stroke="#D2D2D7"/>
  <text x="84" y="372" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" letter-spacing=".2">AI WORKFLOWS</text>
  <text x="271" y="372" fill="#AEAEB2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">·</text>
  <text x="302" y="372" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" letter-spacing=".2">BROWSER PRODUCTS</text>
  <text x="532" y="372" fill="#AEAEB2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">·</text>
  <text x="563" y="372" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500" letter-spacing=".2">PLAYABLE EXPERIMENTS</text>
</svg>
